# Optional local stack: API + static client (build client first: cd client && npm run build)
services:
  api:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      PYTHONPATH: /app/server/src
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      BOT_API_TOKEN: ${BOT_API_TOKEN:-}
      DASHBOARD_CORS_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
    command: >
      sh -c "pip install -q -r server/requirements.txt &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"

  client:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./client/dist:/usr/share/nginx/html:ro
    depends_on:
      - api
