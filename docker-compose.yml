# Two services: FastAPI (api) + static UI with nginx reverse proxy to the API.
# TLS for https://ak07.in is expected on the host (e.g. certbot nginx) forwarding to web:80 or 127.0.0.1:8080.
#
# Copy .env.example to .env in the repo root and set secrets before first up.
# Persist trading/auth data:
#   docker compose up -d
#
services:
  api:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/server/src
      # Bot recycling from inside the API container is usually disabled; run trading_bot on the host or a separate service.
      DASHBOARD_RESTART_BOT_ON_SAVE: ${DASHBOARD_RESTART_BOT_ON_SAVE:-0}
    volumes:
      - ak07_server_data:/app/server/data
    expose:
      - "8000"
    networks:
      - ak07

  web:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.ui
      args:
        VITE_DASHBOARD_API_BASE: ""
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api
    networks:
      - ak07

networks:
  ak07:
    driver: bridge

volumes:
  ak07_server_data:
