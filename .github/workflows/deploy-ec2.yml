# Required secrets: EC2_HOST, EC2_USER, EC2_SSH_KEY, DEPLOY_PATH
# On the server: copy configs/.env.example to repo root `.env` before first deploy.

name: Deploy to EC2

on:
  push:
    branches:
      - AK07

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin
            git checkout AK07
            git pull origin AK07
            docker compose -f configs/docker-compose.yml build --pull
            docker compose -f configs/docker-compose.yml up -d
